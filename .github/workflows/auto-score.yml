name: Auto Score Matches (IPL + WWC)

# Women's T20 World Cup 2026 match times (adjust as needed when schedule is published)
# WWC matches typically run at various times depending on host country.
# Current schedule targets: ~2 PM, 6 PM, and 10 PM IST as a safe catch-all.
# IST = UTC+5:30, so:
#   2:00 PM IST  = 08:30 UTC
#   6:00 PM IST  = 12:30 UTC
#  10:00 PM IST  = 16:30 UTC
#
# Also handles any remaining IPL matches (already finished — skips instantly).
on:
  schedule:
    - cron: "30 0  * * *"   # 6:00 AM IST
    - cron: "30 8  * * *"   # 2:00 PM IST
    - cron: "30 12 * * *"   # 6:00 PM IST
    - cron: "30 16 * * *"   # 10:00 PM IST
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  auto-score:
    name: Trigger auto-score on Railway
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger auto-score (IPL + WWC)
        run: |
          echo "Triggering auto-score on Railway..."
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.RAILWAY_APP_URL }}/api/auto-score" \
            -H "X-Api-Key: ${{ secrets.AUTOSCORE_API_KEY }}" \
            -H "Content-Type: application/json")

          echo "HTTP status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          # 202 = started, 409 = already running (both are fine)
          if [ "$RESPONSE" -ne 202 ] && [ "$RESPONSE" -ne 409 ]; then
            echo "ERROR: Unexpected HTTP status $RESPONSE"
            exit 1
          fi

      - name: Wait and check status
        run: |
          echo "Waiting 90 seconds for job to complete..."
          sleep 90

          echo "Checking auto-score status..."
          curl -s \
            "${{ secrets.RAILWAY_APP_URL }}/api/auto-score/status" \
            -H "X-Api-Key: ${{ secrets.AUTOSCORE_API_KEY }}" | python3 -m json.tool
